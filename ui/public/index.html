<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Predicto — Calibração</title>
    <style>
      :root {
        --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        --border-radius-md: 6px;
        --border-radius-lg: 10px;
        --color-text-primary:    #111827;
        --color-text-secondary:  #4b5563;
        --color-text-tertiary:   #9ca3af;
        --color-text-success:    #1a7a47;
        --color-text-info:       #1d4ed8;
        --color-text-warning:    #856404;
        --color-border-secondary: #d1d5db;
        --color-border-tertiary:  #e5e7eb;
        --color-background-secondary: #f3f4f6;
        --color-background-success:   #d4f5e3;
        --color-background-info:      #dbeafe;
        --color-background-warning:   #fdf2d0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--color-text-primary);
        background: #fff;
        padding: 24px;
      }
      input[type="range"] { accent-color: #5B8DEF; }
      code {
        font-family: var(--font-mono);
        background: var(--color-background-secondary);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
